<div style="max-width:760px;margin:0 auto;padding:20px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <h1 style="font-size:2em;font-weight:700;color:#0f172a;margin-bottom:6px;">
    <span class="freezr_public_app_title">Poster Blog Posts</span>
  </h1>
  <p style="color:#64748b;margin-bottom:28px;">Posts by <span id="owner-name"></span></p>

  <div id="posts-container">
    <p id="loading-msg" style="color:#94a3b8;">Loading posts…</p>
  </div>

  <div id="load-more-wrap" style="text-align:center;margin-top:24px;display:none">
    <button id="btn-load-more" style="padding:9px 24px;background:#0891b2;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">
      Earlier posts
    </button>
  </div>
</div>
