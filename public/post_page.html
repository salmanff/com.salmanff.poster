<div style="max-width:760px;margin:0 auto;padding:20px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <div style="margin-bottom:16px;">
    <a href="/public" style="color:#0891b2;text-decoration:none;font-size:14px;">← All posts</a>
  </div>
  <h1 style="font-size:2.2em;font-weight:800;color:#0891b2;line-height:1.2;margin-bottom:12px;">
    {{#title}}{{title}}{{/title}}{{^title}}Untitled{{/title}}
  </h1>

  <div style="color:#64748b;font-size:13px;margin-bottom:28px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
    <span>By <strong>{{_data_owner}}</strong></span>
    <span>{{__date_published}}</span>
    {{#labels}}<span style="background:#f1f5f9;border-radius:4px;padding:2px 8px;border:1px solid #e2e8f0;">{{.}}</span>{{/labels}}
  </div>

  <div style="font-size:17px;line-height:1.8;color:#1e293b;">
    {{{body}}}
  </div>

  <div style="margin-top:40px;padding-top:20px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:13px;text-align:center;">
    <a href="/ppage" style="color:#0891b2;text-decoration:none;">← Back to all posts</a>
  </div>
</div>
