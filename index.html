<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Poster</span>
      <button id="btn-new-post" class="btn btn-new" title="New post">+ New</button>
    </div>

    <div class="sidebar-search">
      <input id="search-input" type="text" placeholder="Search posts…" autocomplete="off" />
    </div>

    <div id="posts-list" class="posts-list">
      <div class="posts-loading">Loading…</div>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <main id="main-area" class="main-area">

    <!-- Empty state -->
    <div id="no-post-selected" class="empty-state">
      <div class="empty-icon">✍️</div>
      <p>Select a post from the sidebar or create a new one.</p>
    </div>

    <!-- Editor panel -->
    <div id="post-editor" class="post-editor" style="display:none">

      <!-- Top bar -->
      <div class="editor-topbar">
        <button id="btn-sidebar-toggle" class="btn btn-icon" title="Toggle sidebar">☰</button>
        <span id="status-text" class="status-text"></span>
        <div class="topbar-actions">
          <button id="btn-delete"    class="btn btn-ghost btn-danger-txt">Delete</button>
          <button id="btn-save"      class="btn btn-secondary">Save</button>
          <button id="btn-unpublish" class="btn btn-secondary" style="display:none">Unpublish</button>
          <button id="btn-publish"   class="btn btn-primary">Publish</button>
        </div>
      </div>

      <!-- Title & tags -->
      <div class="post-header-area">
        <input id="post-title" class="post-title-input" type="text"
               placeholder="Post title" autocomplete="off" />
        <input id="post-tags"  class="post-tags-input"  type="text"
               placeholder="Tags (space-separated)" autocomplete="off" />
      </div>

      <!-- Rich-text editor -->
      <div id="editor-container" class="editor-wrapper"></div>

      <!-- Meta bar -->
      <div id="post-meta" class="post-meta-bar"></div>

    </div><!-- /post-editor -->

  </main><!-- /main-area -->

  <!-- ── Image modal ── -->
  <div id="image-modal" class="modal" style="display:none" role="dialog" aria-modal="true">
    <div id="image-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-box">
      <h3 class="modal-title">Insert Image</h3>

      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="upload">Upload file</button>
        <button class="tab-btn" data-tab="url">From URL</button>
      </div>

      <div id="img-tab-upload" class="tab-pane">
        <label class="file-drop-zone">
          <input type="file" id="image-file-input" accept="image/*" />
          <span>Click to choose an image or drag &amp; drop</span>
        </label>
        <div id="upload-preview" class="upload-preview"></div>
      </div>

      <div id="img-tab-url" class="tab-pane" style="display:none">
        <input type="text" id="image-url-input" placeholder="https://example.com/photo.jpg" />
      </div>

      <div class="modal-actions">
        <button id="btn-insert-image"  class="btn btn-primary">Insert</button>
        <button id="btn-cancel-image"  class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Publish modal ── -->
  <div id="publish-modal" class="modal" style="display:none" role="dialog" aria-modal="true">
    <div id="publish-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-box">
      <h3 id="publish-modal-title" class="modal-title">Publish Post</h3>

      <div class="form-group">
        <label for="publish-summary">Summary <small>(shown in feeds &amp; previews)</small></label>
        <textarea id="publish-summary" rows="4"
                  placeholder="A short description of your post…"></textarea>
      </div>

      <div class="form-group">
        <label for="publish-image-url">Main image URL <small>(optional — leave blank to auto-detect)</small></label>
        <input type="text" id="publish-image-url" placeholder="https://…" />
      </div>

      <div class="form-group">
        <label for="publish-date">Publish date</label>
        <input type="datetime-local" id="publish-date" />
      </div>

      <div id="publish-status-msg" class="publish-status-msg"></div>

      <div class="modal-actions">
        <button id="btn-confirm-publish" class="btn btn-primary">Publish now</button>
        <button id="btn-cancel-publish"  class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Toast notification ── -->
  <div id="notification" class="notification" style="display:none" role="status"></div>

</div><!-- /#app -->
